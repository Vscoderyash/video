
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        #webcam { position: absolute; top: 10px; left: 10px; width: 280px; height: 210px; border: 2px solid white; z-index: 20; object-fit: cover; background: #111; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 20; }
        #status { position: absolute; top: 10px; left: 310px; color: #fff; font-family: sans-serif; font-size: 0.96rem; pointer-events: none; z-index: 20; }
        #cameraButton { position: absolute; top: 50px; left: 310px; z-index: 20; padding: 8px 14px; font-size: 0.95rem; cursor: pointer; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.35); border-radius: 6px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay muted></video>
    <div id="instructions">Pinch fingers to expand particles. Move hand left/right to change shapes.</div>
    <div id="status">Click the button to request camera access.</div>
    <button id="cameraButton">Allow Camera</button>

    <!-- Load Three.js and MediaPipe via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Hands, FilesetResolver } from '@mediapipe/tasks-vision';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '0';
        document.body.appendChild(renderer.domElement);
        camera.position.set(0, 0, 5);

        const particleCount = 4500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const randoms = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3 + 0] = (Math.random() - 0.5) * 6;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 6;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 1.5;
            randoms[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const material = new THREE.ShaderMaterial({
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            uniforms: {
                uTime: { value: 0 },
                uScale: { value: 1.0 },
                uHue: { value: 0.6 },
                uPointSize: { value: 3.2 }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uScale;
                uniform float uPointSize;
                attribute float aRandom;

                void main() {
                    vec3 pos = position;
                    float wobble = sin(uTime * 1.5 + aRandom * 12.0) * 0.2;
                    pos += normalize(pos) * wobble * 0.3;
                    vec4 mvPosition = modelViewMatrix * vec4(pos * uScale, 1.0);
                    gl_PointSize = uPointSize * (2.0 + 3.0 * sin(uTime + aRandom * 6.2831)) * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform float uHue;

                vec3 hsl2rgb(vec3 hsl) {
                    float h = mod(hsl.x, 1.0);
                    float s = clamp(hsl.y, 0.0, 1.0);
                    float l = clamp(hsl.z, 0.0, 1.0);
                    float c = (1.0 - abs(2.0 * l - 1.0)) * s;
                    float x = c * (1.0 - abs(mod(h * 6.0, 2.0) - 1.0));
                    vec3 rgb = vec3(0.0);
                    if (h < 1.0 / 6.0) rgb = vec3(c, x, 0.0);
                    else if (h < 2.0 / 6.0) rgb = vec3(x, c, 0.0);
                    else if (h < 3.0 / 6.0) rgb = vec3(0.0, c, x);
                    else if (h < 4.0 / 6.0) rgb = vec3(0.0, x, c);
                    else if (h < 5.0 / 6.0) rgb = vec3(x, 0.0, c);
                    else rgb = vec3(c, 0.0, x);
                    float m = l - c * 0.5;
                    return rgb + vec3(m);
                }

                void main() {
                    vec2 uv = gl_PointCoord - 0.5;
                    float dist = length(uv);
                    float alpha = smoothstep(0.5, 0.0, dist);
                    vec3 color = hsl2rgb(vec3(uHue, 0.85, 0.55 + 0.12 * sin(uTime * 0.7)));
                    gl_FragColor = vec4(color, alpha * 0.85);
                }
            `
        });

        const particles = new THREE.Points(geometry, material);
        const particleGroup = new THREE.Group();
        particleGroup.add(particles);
        scene.add(particleGroup);

        const instructions = document.getElementById('instructions');
        const status = document.getElementById('status');
        const cameraButton = document.getElementById('cameraButton');
        const video = document.getElementById('webcam');

        const templates = [
            { name: 'Fireworks', generator: generateFireworks },
            { name: 'Flower', generator: generateFlower },
            { name: 'Saturn', generator: generateSaturn },
            { name: 'Galaxy', generator: generateGalaxy },
            { name: 'Heart', generator: generateHeart },
            { name: 'Butterfly', generator: generateButterfly }
        ];

        let currentTemplate = 0;
        let lastGestureTime = 0;
        let targetRotationY = 0;

        function setTemplate(index) {
            index = THREE.MathUtils.euclideanModulo(index, templates.length);
            if (index === currentTemplate) return;
            currentTemplate = index;
            templates[currentTemplate].generator();
            geometry.attributes.position.needsUpdate = true;
            updateInstructions();
        }

        function updateInstructions() {
            instructions.innerHTML = `Shape: <strong>${templates[currentTemplate].name}</strong> — pinch to expand, move hand left/right to rotate, raise/lower to shift hue.`;
        }

        function generateHeart() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = 0.8 * (1 - Math.sin(t)) + (Math.random() - 0.5) * 0.15;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                positions[i * 3 + 0] = x * 0.055 + (Math.random() - 0.5) * 0.05;
                positions[i * 3 + 1] = y * 0.055 + (Math.random() - 0.5) * 0.05;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.25;
            }
        }

        function generateFlower() {
            for (let i = 0; i < particleCount; i++) {
                const a = Math.random() * Math.PI * 2;
                const petals = 5 + Math.round(Math.sin(a * 2.3) * 0.5);
                const r = 0.8 * Math.abs(Math.cos(petals * a)) + 0.2 * Math.random();
                positions[i * 3 + 0] = Math.cos(a) * r + (Math.random() - 0.5) * 0.08;
                positions[i * 3 + 1] = Math.sin(a) * r + (Math.random() - 0.5) * 0.08;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
            }
        }

        function generateSaturn() {
            for (let i = 0; i < particleCount; i++) {
                if (i < particleCount * 0.25) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = 0.5 + Math.random() * 0.18;
                    positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = r * Math.cos(phi);
                } else {
                    const theta = Math.random() * Math.PI * 2;
                    const radius = 1.2 + (Math.random() - 0.5) * 0.08;
                    positions[i * 3 + 0] = Math.cos(theta) * radius;
                    positions[i * 3 + 1] = Math.sin(theta) * radius;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.08;
                }
            }
        }

        function generateFireworks() {
            for (let i = 0; i < particleCount; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.35) * 3.0;
                positions[i * 3 + 0] = Math.cos(a) * r;
                positions[i * 3 + 1] = Math.sin(a) * r;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
            }
        }

        function generateGalaxy() {
            const arms = 4;
            for (let i = 0; i < particleCount; i++) {
                const branch = i % arms;
                const radius = Math.pow(Math.random(), 1.2) * 2.6;
                const angle = radius * 1.7 + (branch * Math.PI * 2) / arms;
                positions[i * 3 + 0] = Math.cos(angle) * radius + (Math.random() - 0.5) * 0.12;
                positions[i * 3 + 1] = Math.sin(angle) * radius + (Math.random() - 0.5) * 0.12;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
            }
        }

        function generateButterfly() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sin(2 * t) * Math.cos(t) * 1.2;
                positions[i * 3 + 0] = r * Math.cos(t) + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 1] = r * Math.sin(t) * 0.85 + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.25;
            }
        }

        generateFireworks();
        updateInstructions();

        function getExtendedFingers(hand) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let count = 0;
            for (let j = 0; j < tips.length; j++) {
                if (hand[tips[j]].y < hand[pips[j]].y) count += 1;
            }
            const thumbExtended = Math.abs(hand[4].x - hand[3].x) > 0.08;
            if (thumbExtended) count += 1;
            return count;
        }

        let running = true;
        async function initHands(stream) {
            try {
                video.muted = true;
                video.playsInline = true;
                video.autoplay = true;
                video.style.display = 'block';
                video.srcObject = stream;

                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
                const handDetector = await Hands.createFromOptions(vision, {
                    numHands: 1,
                    runningMode: 'VIDEO'
                });

                await video.play();
                status.textContent = 'Camera active — move your hand in front of the lens.';

                video.addEventListener('error', () => {
                    status.textContent = 'Camera loaded but video playback failed. Refresh and allow camera access.';
                });

                async function predict() {
                    if (!running) return;
                    const results = await handDetector.detectForVideo(video, performance.now());
                    if (results.landmarks && results.landmarks.length > 0) {
                        const hand = results.landmarks[0];
                        const pinchDistance = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
                        material.uniforms.uScale.value = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(pinchDistance, 0.02, 0.18, 0.85, 3.2), 0.85, 3.2);
                        const hue = THREE.MathUtils.clamp(hand[0].x, 0, 1);
                        material.uniforms.uHue.value = hue;
                        material.uniforms.uPointSize.value = THREE.MathUtils.mapLinear(hand[0].y, 0, 1, 4.0, 2.2);
                        targetRotationY = (hand[0].x - 0.5) * Math.PI * 0.8;

                        const extendedCount = getExtendedFingers(hand);
                        if (performance.now() - lastGestureTime > 500) {
                            setTemplate(extendedCount);
                            lastGestureTime = performance.now();
                        }
                    }
                    requestAnimationFrame(predict);
                }

                video.addEventListener('loadeddata', predict);
                predict();
            } catch (error) {
                status.textContent = 'Camera unavailable. Use Chrome on localhost with Live Server and allow camera permission.';
                console.error(error);
            }
        }

        async function requestCameraPermission() {
            status.textContent = 'Requesting camera permission...';
            cameraButton.disabled = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                cameraButton.style.display = 'none';
                await initHands(stream);
            } catch (err) {
                status.textContent = 'Camera permission denied or blocked. Open site settings and allow camera access.';
                cameraButton.disabled = false;
                console.error(err);
            }
        }

        cameraButton.addEventListener('click', requestCameraPermission);
        requestCameraPermission();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value += 0.03;
            particleGroup.rotation.y += (targetRotationY - particleGroup.rotation.y) * 0.05;
            particleGroup.rotation.x = Math.sin(material.uniforms.uTime.value * 0.2) * 0.1;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
