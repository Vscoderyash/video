<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        #webcam { position: absolute; top: 10px; left: 10px; width: 320px; height: 240px; border: 2px solid #fff; z-index: 20; object-fit: cover; background: #111; }
        #controls { position: absolute; top: 10px; left: 350px; z-index: 100; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        #status { font-size: 0.95rem; max-width: 300px; }
        #cameraButton { position: relative; z-index: 110; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; cursor: pointer; }
        #cameraButton:disabled { opacity: 0.5; cursor: default; }
        #instructions { position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center; z-index: 20; font-size: 0.95rem; }
    </style>
</head>
<body>
    <video id="webcam" autoplay muted></video>
    <div id="controls">
        <button id="cameraButton">Allow Camera</button>
        <div id="status">Click the button to request webcam access in Chrome on Live Server.</div>
    </div>
    <div id="instructions">Pinch to expand, move left/right to rotate, raise/lower to shift color.</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { Hands, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3';

        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const cameraButton = document.getElementById('cameraButton');
        const instructions = document.getElementById('instructions');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '0';
        document.body.appendChild(renderer.domElement);
        camera.position.set(0, 0, 5);

        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const randoms = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 6;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 6;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 1.5;
            randoms[i] = Math.random();
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const material = new THREE.ShaderMaterial({
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            uniforms: {
                uTime: { value: 0 },
                uScale: { value: 1.0 },
                uHue: { value: 0.6 },
                uPointSize: { value: 3.2 }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uScale;
                uniform float uPointSize;
                attribute float aRandom;
                void main() {
                    vec3 pos = position;
                    pos += normalize(pos) * sin(uTime * 1.5 + aRandom * 12.0) * 0.2;
                    vec4 mvPosition = modelViewMatrix * vec4(pos * uScale, 1.0);
                    gl_PointSize = uPointSize * (2.0 + 3.0 * sin(uTime + aRandom * 6.2831)) * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform float uHue;
                vec3 hsl2rgb(vec3 hsl) {
                    float h = mod(hsl.x, 1.0);
                    float s = clamp(hsl.y, 0.0, 1.0);
                    float l = clamp(hsl.z, 0.0, 1.0);
                    float c = (1.0 - abs(2.0 * l - 1.0)) * s;
                    float x = c * (1.0 - abs(mod(h * 6.0, 2.0) - 1.0));
                    vec3 rgb = vec3(0.0);
                    if (h < 1.0 / 6.0) rgb = vec3(c, x, 0.0);
                    else if (h < 2.0 / 6.0) rgb = vec3(x, c, 0.0);
                    else if (h < 3.0 / 6.0) rgb = vec3(0.0, c, x);
                    else if (h < 4.0 / 6.0) rgb = vec3(0.0, x, c);
                    else if (h < 5.0 / 6.0) rgb = vec3(x, 0.0, c);
                    else rgb = vec3(c, 0.0, x);
                    float m = l - c * 0.5;
                    return rgb + vec3(m);
                }
                void main() {
                    vec2 uv = gl_PointCoord - 0.5;
                    float dist = length(uv);
                    float alpha = smoothstep(0.5, 0.0, dist);
                    vec3 color = hsl2rgb(vec3(uHue, 0.85, 0.55 + 0.12 * sin(uTime * 0.7)));
                    gl_FragColor = vec4(color, alpha * 0.85);
                }
            `
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        const templates = [
            { name: 'Fireworks', generator: generateFireworks },
            { name: 'Flower', generator: generateFlower },
            { name: 'Saturn', generator: generateSaturn },
            { name: 'Galaxy', generator: generateGalaxy },
            { name: 'Heart', generator: generateHeart },
            { name: 'Butterfly', generator: generateButterfly }
        ];

        let currentTemplate = 0;
        let targetRotationY = 0;
        let lastGestureTime = 0;

        function setTemplate(index) {
            index = THREE.MathUtils.euclideanModulo(index, templates.length);
            if (index === currentTemplate) return;
            currentTemplate = index;
            templates[index].generator();
            geometry.attributes.position.needsUpdate = true;
            instructions.innerHTML = `Shape: <strong>${templates[index].name}</strong> — pinch to expand, move left/right to rotate, raise/lower to shift color.`;
        }

        function generateHeart() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                positions[i * 3] = x * 0.055 + (Math.random() - 0.5) * 0.05;
                positions[i * 3 + 1] = y * 0.055 + (Math.random() - 0.5) * 0.05;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.25;
            }
        }

        function generateFlower() {
            for (let i = 0; i < particleCount; i++) {
                const a = Math.random() * Math.PI * 2;
                const petals = 5 + Math.round(Math.sin(a * 2.3) * 0.5);
                const r = 0.8 * Math.abs(Math.cos(petals * a)) + 0.2 * Math.random();
                positions[i * 3] = Math.cos(a) * r + (Math.random() - 0.5) * 0.08;
                positions[i * 3 + 1] = Math.sin(a) * r + (Math.random() - 0.5) * 0.08;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
            }
        }

        function generateSaturn() {
            for (let i = 0; i < particleCount; i++) {
                if (i < particleCount * 0.25) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = 0.5 + Math.random() * 0.18;
                    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = r * Math.cos(phi);
                } else {
                    const theta = Math.random() * Math.PI * 2;
                    const radius = 1.2 + (Math.random() - 0.5) * 0.08;
                    positions[i * 3] = Math.cos(theta) * radius;
                    positions[i * 3 + 1] = Math.sin(theta) * radius;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.08;
                }
            }
        }

        function generateGalaxy() {
            const arms = 4;
            for (let i = 0; i < particleCount; i++) {
                const branch = i % arms;
                const radius = Math.pow(Math.random(), 1.2) * 2.6;
                const angle = radius * 1.7 + (branch * Math.PI * 2) / arms;
                positions[i * 3] = Math.cos(angle) * radius + (Math.random() - 0.5) * 0.12;
                positions[i * 3 + 1] = Math.sin(angle) * radius + (Math.random() - 0.5) * 0.12;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
            }
        }

        function generateFireworks() {
            for (let i = 0; i < particleCount; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.35) * 3.0;
                positions[i * 3] = Math.cos(a) * r;
                positions[i * 3 + 1] = Math.sin(a) * r;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
            }
        }

        function generateButterfly() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sin(2 * t) * Math.cos(t) * 1.2;
                positions[i * 3] = r * Math.cos(t) + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 1] = r * Math.sin(t) * 0.85 + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.25;
            }
        }

        function getExtendedFingers(hand) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let count = 0;
            for (let j = 0; j < tips.length; j++) {
                if (hand[tips[j]].y < hand[pips[j]].y) count += 1;
            }
            if (Math.abs(hand[4].x - hand[3].x) > 0.08) count += 1;
            return count;
        }

        setTemplate(0);

        async function initHands(stream) {
            try {
                video.srcObject = stream;
                video.muted = true;
                video.playsInline = true;
                video.autoplay = true;
                video.style.display = 'block';

                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
                const handDetector = await Hands.createFromOptions(vision, {
                    numHands: 1,
                    runningMode: 'VIDEO'
                });

                await video.play();
                status.textContent = 'Camera active. Show your hand to control particles.';
                cameraButton.style.display = 'none';

                async function predict() {
                    const results = await handDetector.detectForVideo(video, performance.now());
                    if (results.landmarks?.length > 0) {
                        const hand = results.landmarks[0];
                        const pinchDistance = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
                        material.uniforms.uScale.value = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(pinchDistance, 0.02, 0.18, 0.85, 3.2), 0.85, 3.2);
                        material.uniforms.uHue.value = THREE.MathUtils.clamp(hand[0].x, 0, 1);
                        material.uniforms.uPointSize.value = THREE.MathUtils.mapLinear(hand[0].y, 0, 1, 4.0, 2.2);
                        targetRotationY = (hand[0].x - 0.5) * Math.PI * 0.8;
                        const fingers = getExtendedFingers(hand);
                        if (performance.now() - lastGestureTime > 500) {
                            setTemplate(fingers);
                            lastGestureTime = performance.now();
                        }
                    }
                    requestAnimationFrame(predict);
                }

                predict();
            } catch (error) {
                status.textContent = 'Unable to access camera. Check Chrome permission and Live Server.';
                console.error(error);
                cameraButton.disabled = false;
            }
        }

        function canUseCamera() {
            if (!navigator.mediaDevices?.getUserMedia) {
                status.textContent = 'Webcam is not supported by this browser.';
                return false;
            }
            if (!window.isSecureContext && !/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) {
                status.textContent = 'Use localhost or HTTPS. Start Live Server or a local HTTP server.';
                return false;
            }
            return true;
        }

        async function requestCameraPermission() {
            if (!canUseCamera()) {
                cameraButton.disabled = false;
                return;
            }
            status.textContent = 'Requesting camera permission...';
            cameraButton.disabled = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                await initHands(stream);
            } catch (error) {
                status.textContent = 'Camera permission denied or blocked. Refresh and allow camera access.';
                console.error(error);
                cameraButton.disabled = false;
                cameraButton.style.display = 'block';
            }
        }

        cameraButton.addEventListener('click', requestCameraPermission);

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value += 0.03;
            particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.05;
            particles.rotation.x = Math.sin(material.uniforms.uTime.value * 0.2) * 0.08;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
